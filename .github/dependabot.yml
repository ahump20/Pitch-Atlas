version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      react-three-stack:
        patterns:
          - three
          - "@react-three/*"
      test-tooling:
        patterns:
          - vitest
          - "@testing-library/*"
          - jsdom
      lint-tooling:
        patterns:
          - eslint
          - typescript-eslint
          - eslint-*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Chicago
    open-pull-requests-limit: 5
