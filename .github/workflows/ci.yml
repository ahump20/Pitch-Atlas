name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  checks: read
  contents: read
  deployments: read
  pull-requests: read
  statuses: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download actionlint
        id: get_actionlint
        shell: bash
        run: bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint GitHub Actions workflows
        shell: bash
        env:
          ACTIONLINT: ${{ steps.get_actionlint.outputs.executable }}
        run: |
          "$ACTIONLINT" -color

      - name: Check for Node app
        id: node_app
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json yet. Repo foundation is present; Node verification will start once the app is initialized."
          fi

      - name: Setup Node
        if: steps.node_app.outputs.present == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Require npm lockfile
        if: steps.node_app.outputs.present == 'true'
        shell: bash
        run: |
          test -f package-lock.json || (echo "package-lock.json is required" && exit 1)

      - name: Install
        if: steps.node_app.outputs.present == 'true'
        run: npm ci

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Check orphan-media cleanup function
        run: |
          deno fmt --check \
            supabase/functions/gc-orphan-discussion-media/index.ts \
            supabase/functions/gc-orphan-discussion-media/deno.json
          deno check --frozen \
            --config supabase/functions/gc-orphan-discussion-media/deno.json \
            supabase/functions/gc-orphan-discussion-media/index.ts

      - name: Typecheck
        if: steps.node_app.outputs.present == 'true'
        run: npm run typecheck

      - name: Lint
        if: steps.node_app.outputs.present == 'true'
        run: npm run lint

      - name: Test
        if: steps.node_app.outputs.present == 'true'
        run: npm run test

      - name: Build
        if: steps.node_app.outputs.present == 'true'
        run: npm run build

      - name: Install Playwright Chromium
        if: steps.node_app.outputs.present == 'true'
        run: npx playwright install --with-deps --only-shell chromium

      - name: Browser smoke test local preview
        if: steps.node_app.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail

          npm run preview -- --host 127.0.0.1 > /tmp/pitch-atlas-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true; cat /tmp/pitch-atlas-preview.log' EXIT

          for _ in {1..30}; do
            if curl --fail --silent --show-error --connect-timeout 2 --max-time 5 \
              http://127.0.0.1:4173/ > /tmp/pitch-atlas-preview-home.html; then
              break
            fi
            sleep 1
          done

          test -s /tmp/pitch-atlas-preview-home.html || (echo "Local preview did not serve /" && exit 1)
          npm run test:preview:browser -- http://127.0.0.1:4173

      - name: Resolve hosted deploy preview
        id: hosted_preview
        if: steps.node_app.outputs.present == 'true' && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/resolve-pr-preview-url.mjs

      - name: Browser smoke test hosted deploy preview
        if: steps.hosted_preview.outputs.url != ''
        env:
          PREVIEW_URL: ${{ steps.hosted_preview.outputs.url }}
        run: npm run test:preview:browser -- "$PREVIEW_URL"
