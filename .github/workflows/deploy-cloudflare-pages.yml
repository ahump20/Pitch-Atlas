name: deploy-cloudflare-pages

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pitch-atlas-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://pitch-atlas.com

    steps:
      - name: Require main branch
        shell: bash
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "Production deploys must run from main; received $GITHUB_REF"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Require package and lockfile
        shell: bash
        run: |
          test -f package.json || (echo "package.json is required before deployment" && exit 1)
          test -f package-lock.json || (echo "package-lock.json is required before deployment" && exit 1)

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy_preview
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'pitch-atlas' }} --branch=preflight-${{ github.run_id }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test preview
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs['pages-deployment-alias-url'] || steps.deploy_preview.outputs['deployment-url'] }}
        run: |
          set -euo pipefail
          test -n "$PREVIEW_URL" || (echo "Preview deployment URL was not returned" && exit 1)

          origin="${PREVIEW_URL%/}"
          fetch() {
            curl --fail --silent --show-error --location --retry 5 --retry-delay 2 "$origin$1"
          }

          home="$(fetch /)"
          repertoire="$(fetch /repertoire/)"
          four_seam="$(fetch /pitch/four-seam/)"

          grep -Fq '<h1' <<< "$home"
          grep -Fq 'Pitch Atlas' <<< "$home"
          grep -Fq 'https://pitch-atlas.com/' <<< "$home"

          grep -Fq '<title>The Pitch Index: every pitch, by family | Pitch Atlas</title>' <<< "$repertoire"
          grep -Fq '<link rel="canonical" href="https://pitch-atlas.com/repertoire/">' <<< "$repertoire"
          grep -Fq 'SearchAction' <<< "$repertoire"
          if grep -Fq 'five pitches' <<< "$repertoire"; then
            echo "Stale Pitch Index copy found"
            exit 1
          fi
          if grep -Fq '2026-06-04' <<< "$repertoire"; then
            echo "Stale Pitch Index retrieval date found"
            exit 1
          fi

          grep -Fq '<title>Four-seam fastball: grip, release, and movement | Pitch Atlas</title>' <<< "$four_seam"
          grep -Fq '<link rel="canonical" href="https://pitch-atlas.com/pitch/four-seam/">' <<< "$four_seam"

          status="$(curl --silent --show-error --location --output /tmp/pitch-atlas-404.html --write-out '%{http_code}' "$origin/not-in-the-atlas")"
          test "$status" = "404" || (echo "Expected unknown route to return 404, got $status" && exit 1)
          grep -Fq 'That file is not in the atlas.' /tmp/pitch-atlas-404.html

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps --only-shell chromium

      - name: Browser smoke test preview
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs['pages-deployment-alias-url'] || steps.deploy_preview.outputs['deployment-url'] }}
        run: npm run test:preview:browser -- "$PREVIEW_URL"

      - name: Deploy production to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Production runs only after the exact dist/ artifact has rendered on
          # a Pages preview and passed the public route smoke test above.
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'pitch-atlas' }} --branch=main --commit-hash=${{ github.sha }} --commit-dirty=false
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
