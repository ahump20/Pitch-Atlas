name: Bug report
description: Report a bug in Pitch Atlas v1
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Keep reports focused on reproducible behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: Provenance impact
      description: Does this affect how sources or provenance labels are shown?
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser, OS, and app version/commit if known.
