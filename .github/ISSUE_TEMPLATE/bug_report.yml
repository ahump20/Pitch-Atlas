name: Bug report
description: Report a broken behavior, rendering issue, or accessibility problem.
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What broke?
      description: Describe the behavior and the expected result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include browser, device, and WebGL/reduced-motion state when relevant.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, console output, or links.
